<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rainy Days outdoor rain jackets">
    <title>Rainy Days | Home</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="site-header">
    <div class="container">
        <input type="checkbox" id="menu-toggle" class="menu-toggle">

        <div class="header-content">
            <label for="menu-toggle" class="hamburger">

                <i class="fa-solid fa-bars hamburger-open"></i>

                <i class="fa-solid fa-xmark hamburger-close"></i>

            </label>

            <a href="index.html" class="logo">
                <img src="images/RainyDays_Logo.png" alt="Rainy Days">
            </a>

            <nav aria-label="Main navigation">
                <ul class="nav-list main-nav">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="men.html">Men</a></li>
                    <li><a href="women.html">Women</a></li>
                    <li><a href="jackets.html">Jackets</a></li>
                </ul>
            </nav>

            <a href="cart.html" class="cart-link">
                <i class="fa-solid fa-cart-shopping"></i>
            </a>
        </div>
    </div>
</header>
<main>
    <section class="checkout-page">
        <div class="container">

            <div class="checkout-layout">

                <form class="checkout-form" action="success.html">

                    <section class="form-section">
                        <h1 class="subsection-title">Delivery Details</h1>

                        <div class="form-group">
                            <label for="full-name">Full Name</label>
                            <input type="text" id="full-name" name="full-name" value="Ola Normann">
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" value="ola@email.com">
                        </div>

                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" id="address" name="address" value="Karl Johan 14">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="city">City</label>
                                <input type="text" id="city" name="city" value="Oslo">
                            </div>

                            <div class="form-group">
                                <label for="postcode">Postcode</label>
                                <input type="text" id="postcode" name="postcode" value="0150">
                            </div>
                        </div>
                    </section>

                    <section class="form-section">
                        <h2 class="subsection-title">Payment Details</h2>

                        <div class="form-group">
                            <label for="card-number">Card Number</label>
                            <input type="text" id="card-number" name="card-number" value="1234 5678 9012 3456">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="expiry">Expiry Date</label>
                                <input type="text" id="expiry" name="expiry" placeholder="MM/YY">
                            </div>

                            <div class="form-group">
                                <label for="cvc">CVC</label>
                                <input type="text" id="cvc" name="cvc" value="123">
                            </div>
                        </div>
                        <div class="payment-submit">
                            <button type="submit" class="btn btn-primary">
                                Place Order
                            </button>
                        </div>
                    </section>

                </form>

                <aside class="order-summary checkout-summary">

                    <h2>Order Summary</h2>

                    <div class="cart-item-info">

                        <img src="images/productimage.jpg" alt="Fleece Overshirt">

                        <div>
                            <h2 class="product-title">Fleece Overshirt</h2>
                            <p class="product-size">Size M.</p>
                        </div>

                    </div>

                    <div class="summary-row">
                        <span class="summary-identifier">Subtotal</span>
                        <span class="summary-value">1200 NOK</span>
                    </div>

                    <div class="summary-row">
                        <span class="summary-identifier">Shipping</span>
                        <span class="summary-value">Free</span>
                    </div>

                    <div class="summary-divider">

                    </div>

                    <div class="summary-row total">
                        <span class="summary-total">Total</span>
                        <span class="summary-total-value">1200 NOK</span>
                    </div>

          
                </aside>

            </div>

        </div>
    </section>
</main>
<footer class="site-footer">

    <div class="container">

        <nav aria-label="Footer navigation">

            <ul class="footer-nav">

                <li><a href="index.html">Home</a></li>
                <li><a href="men.html">Men</a></li>
                <li><a href="women.html">Women</a></li>
                <li><a href="jackets.html">Jackets</a></li>

            </ul>

        </nav>

    </div>

</footer>
