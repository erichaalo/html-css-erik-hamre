<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rainy Days outdoor rain jackets">
    <title>Rainy Days | Home</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<header class="site-header">

    <div class="container header-content">

        <a href="index.html" class="logo">
            <img src="images/RainyDays_Logo.png" alt="Company Name">
        </a>

        <nav aria-label="Main navigation">

            <ul class="nav-list main-nav">

                <li><a href="index.html">Home</a></li>
                <li><a href="men.html">Men</a></li>
                <li><a href="women.html">Women</a></li>
                <li><a href="jackets.html">Jackets</a></li>
                <li><a href="cart.html">Cart</a></li>

            </ul>

        </nav>

    </div>

</header>

<main>

    <section class="cart-page">

        <div class="container">

            <h1 class="page-title">
                Your Cart
            </h1>

            <div class="cart-item">

                <div class="cart-item-info">

                    <img src="images/productimage.jpg" alt="Fleece Overshirt">

                    <div>
                        <h2 class="product-title">Fleece Overshirt</h2>
                        <p class="product-size">Size M.</p>
                        <p class="product-price">1200 NOK</p>
                    </div>

                </div>

                <div class="cart-item-actions">

                    <div class="quantity-selector">

                    <input
                        type="number"
                        id="quantity"
                        name="quantity"
                        min="1"
                        max="99"
                        value="1">

                </div>

                <p class="product-price">1200 NOK</p>

                </div>

            </div>

            <aside class="order-summary">

                <h2>Order Summary</h2>

                <div class="summary-row">
                    <span class="summary-identifier">Subtotal</span>
                    <span class="summary-value">1200 NOK</span>
                </div>

                <div class="summary-row">
                    <span class="summary-identifier">Shipping</span>
                    <span class="summary-value">Free</span>
                </div>

                <div class="summary-divider">

              

                </div>

                <div class="summary-row total">
                    <span class="summary-total">Total</span>
                    <span class="summary-total-value">1200 NOK</span>
                </div>

                <a href="checkout.html"
                   class="btn btn-primary">
                    Proceed to Checkout
                </a>

            </aside>

        </div>

    </section>

</main>

<footer class="site-footer">

    <div class="container">

        <nav aria-label="Footer navigation">

            <ul class="footer-nav">

                <li><a href="index.html">Home</a></li>
                <li><a href="men.html">Men</a></li>
                <li><a href="women.html">Women</a></li>
                <li><a href="jackets.html">Jackets</a></li>

            </ul>

        </nav>

    </div>

</footer>
</body>
</html>
